name: default
on:
    push:
        branches:
            - master

jobs:
    test-lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Prepare image
              run: sudo apt-get -y update && sudo apt-get -y install python3-pip libenchant-2-2 aspell-en

            - name: Install dependencies
              run: pip3 install -e ".[full,dev]"
            - run: isort --check-only --diff .
            - run: pylint morss --rcfile=.pylintrc --disable=C,R,W --fail-under=8
            - run: pytest --cov=morss tests
